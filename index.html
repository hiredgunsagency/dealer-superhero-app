<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dealer Superhero | Intelligence Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;700;800;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0A0A0F;--bg2:#111118;--card:#16161F;--card2:#1C1C28;
      --border:#252535;--border2:#333348;
      --blue:#01B0F1;--blue-light:#5ECFFF;--blue-glow:rgba(1,176,241,0.25);
      --red:#FE0000;--red-light:#FF5555;
      --white:#F0F0F8;--white2:#B8B8CC;--muted:#6868A0;
      --success:#22C55E;--success-bg:rgba(34,197,94,0.12);
      --warning:#F59E0B;--warning-bg:rgba(245,158,11,0.12);
      --danger:#EF4444;--danger-bg:rgba(239,68,68,0.12);
      --font-h:'Unbounded',sans-serif;--font-b:'Space Grotesk',sans-serif;
      --r:12px;--rs:8px;
      --sidebar:240px;
    }
    body{background:var(--bg);color:var(--white);font-family:var(--font-b);min-height:100vh;display:flex;}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;}
    .sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);}
    .logo-mark{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
    .logo-text{font-family:var(--font-h);font-size:11px;font-weight:700;letter-spacing:0.1em;}
    .logo-text span{color:var(--blue);}
    .logo-sub{font-size:10px;color:var(--muted);}
    .nav{padding:12px 0;flex:1;}
    .nav-section{padding:8px 16px 4px;font-family:var(--font-h);font-size:9px;font-weight:700;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:14px;color:var(--white2);cursor:pointer;transition:all 0.2s;border-left:2px solid transparent;}
    .nav-item:hover{color:var(--white);background:rgba(255,255,255,0.04);}
    .nav-item.active{color:var(--blue-light);background:rgba(65,105,225,0.08);border-left-color:var(--blue);}
    .nav-icon{width:18px;height:18px;flex-shrink:0;stroke:currentColor;}
    .sidebar-footer{padding:16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);}

    /* MAIN */
    .main{margin-left:var(--sidebar);flex:1;min-height:100vh;}
    .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
    .topbar-title{font-family:var(--font-h);font-size:13px;font-weight:700;letter-spacing:0.05em;}
    .topbar-actions{display:flex;gap:10px;align-items:center;}
    .content{padding:28px;}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--rs);font-family:var(--font-h);font-size:10px;font-weight:700;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;border:none;}
    .btn-primary{background:var(--blue);color:#fff;}
    .btn-primary:hover{background:#5577F8;}
    .btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--white2);}
    .btn-ghost:hover{border-color:var(--blue);color:var(--blue-light);}
    .btn-danger{background:var(--danger-bg);border:1px solid rgba(239,68,68,0.3);color:var(--danger);}
    .btn-sm{padding:6px 12px;font-size:9px;}

    /* CARDS */
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;}
    .card-sm{padding:16px 18px;}

    /* STATS ROW */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;}
    .stat-label{font-family:var(--font-h);font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .stat-value{font-family:var(--font-h);font-size:30px;font-weight:800;color:var(--white);line-height:1;}
    .stat-sub{font-size:12px;color:var(--muted);margin-top:4px;}

    /* TABLE */
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    th{font-family:var(--font-h);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);}
    td{padding:13px 16px;font-size:14px;color:var(--white2);border-bottom:1px solid var(--border);}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(255,255,255,0.02);color:var(--white);}
    .td-main{color:var(--white);font-weight:500;}

    /* BADGES */
    .badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;font-family:var(--font-h);letter-spacing:0.06em;padding:3px 10px;border-radius:100px;text-transform:uppercase;}
    .badge-active{background:var(--success-bg);color:var(--success);}
    .badge-draft{background:var(--warning-bg);color:var(--warning);}
    .badge-paused{background:rgba(104,104,160,0.15);color:var(--muted);}
    .badge-review{background:var(--danger-bg);color:var(--danger);}
    .b-pass{background:#22C55E;color:#fff;font-weight:800;}
    .b-warn{background:#F59E0B;color:#fff;font-weight:800;}
    .b-fail{background:#EF4444;color:#fff;font-weight:800;}

    /* FORMS */
    .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;}
    .field{display:flex;flex-direction:column;gap:6px;}
    .field label{font-size:12px;font-weight:600;color:var(--white2);letter-spacing:0.04em;text-transform:uppercase;}
    .field input,.field select,.field textarea{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);color:var(--white);font-family:var(--font-b);font-size:15px;padding:11px 13px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;-webkit-appearance:none;width:100%;}
    .field input::placeholder,.field textarea::placeholder{color:var(--muted);}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow);}
    .field select option{background:var(--card2);}
    .field textarea{resize:vertical;min-height:80px;}
    .field-hint{font-size:11px;color:var(--muted);}
    .form-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:8px;}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;display:none;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;}
    .modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .modal-title{font-family:var(--font-h);font-size:13px;font-weight:700;}
    .modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px;}
    .modal-close:hover{color:var(--white);}
    .modal-body{padding:24px;}
    .modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}

    /* SECTION HEADER */
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .section-title{font-family:var(--font-h);font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--white);}
    .section-sub{font-size:14px;color:var(--muted);margin-top:3px;}

    /* DEALER DETAIL */
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
    .detail-card{background:var(--card2);border-radius:var(--rs);padding:14px 16px;}
    .detail-label{font-family:var(--font-h);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
    .detail-value{font-size:15px;color:var(--white);}

    /* SCORE RING */
    .score-ring{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:72px;height:72px;border-radius:50%;border:3px solid;font-family:var(--font-h);}
    .score-num{font-size:20px;font-weight:900;line-height:1;}
    .score-lbl{font-size:8px;opacity:0.6;margin-top:1px;}

    /* CHANNEL SCORES */
    .channels-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px;}
    .channel-card{background:var(--card2);border-radius:var(--rs);padding:14px 16px;}
    .channel-name{font-family:var(--font-h);font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--white);margin-bottom:8px;}
    .channel-score{font-family:var(--font-h);font-size:22px;font-weight:800;margin-bottom:6px;}
    .channel-bar-track{height:4px;background:var(--border);border-radius:2px;}
    .channel-bar-fill{height:4px;border-radius:2px;}

    /* EMPTY STATE */
    .empty{text-align:center;padding:60px 20px;}
    .empty-icon{font-size:40px;margin-bottom:16px;}
    .empty-title{font-family:var(--font-h);font-size:14px;font-weight:700;margin-bottom:8px;}
    .empty-sub{font-size:13px;color:var(--muted);max-width:320px;margin:0 auto 20px;}

    /* ALERTS */
    .alert{padding:12px 16px;border-radius:var(--rs);font-size:13px;margin-bottom:16px;display:none;}
    .alert-success{background:var(--success-bg);border:1px solid rgba(34,197,94,0.3);color:var(--success);}
    .alert-error{background:var(--danger-bg);border:1px solid rgba(239,68,68,0.3);color:var(--danger);}

    /* TABS */
    .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px;}
    .tab{padding:10px 18px;font-family:var(--font-h);font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;}
    .tab:hover{color:var(--white2);}
    .tab.active{color:var(--blue-light);border-bottom-color:var(--blue);}

    /* VENDOR PROMISE */
    .promise-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
    .promise-row:last-child{border-bottom:none;}
    .promise-label{font-size:12px;color:var(--muted);width:200px;flex-shrink:0;}
    .promise-value{font-size:13px;color:var(--white);flex:1;}

    .divider{border:none;border-top:1px solid var(--border);margin:20px 0;}

    @media(max-width:768px){
      .sidebar{display:none;}
      .main{margin-left:0;}
      .detail-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <img src="logo.png" alt="Dealer Superhero" style="width:180px;height:auto;display:block;"/>
    </div>
    <div class="logo-sub" style="margin-top:8px;font-size:11px;">Intelligence Platform</div>
  </div>
  <nav class="nav">
    <div class="nav-section">Main</div>
    <div class="nav-item active" onclick="showPage('dashboard')"><i data-lucide="layout-dashboard" class="nav-icon"></i>Dashboard</div>
    <div class="nav-item" onclick="showPage('dealers')"><i data-lucide="building-2" class="nav-icon"></i>Dealers</div>
    <div class="nav-section">Tools</div>

<!-- MAIN CONTENT -->

    <div class="topbar-actions" id="topbarActions"></div>
  </div>

</main>

<!-- ADD DEALER MODAL -->
<div class="modal-overlay" id="dealerModal">

      <div class="form-grid">

        </div>
        <div class="field">
          <label>Brand / Make</label>
          <input type="text" id="d_brand" placeholder="Subaru"/>
        </div>
        <div class="field">
          <label>City</label>
          <input type="text" id="d_city" placeholder="Kingston"/>
        </div>
        <div class="field">
          <label>State</label>
          <input type="text" id="d_state" placeholder="TN"/>
        </div>
        <div class="field">
          <label>Website URL</label>
          <input type="url" id="d_website" placeholder="https://"/>
        </div>
        <div class="field">
          <label>Google Business Profile URL</label>
          <input type="url" id="d_gbp" placeholder="https://maps.app.goo.gl/..."/>
        </div>
        <div class="field">
          <label>Website Provider / CMS</label>
          <select id="d_cms">
            <option value="">Select...</option>
            <option>DealerOn</option>
            <option>Dealer.com (Cox Automotive)</option>
            <option>Dealer Inspire (Cars.com)</option>
            <option>DealerFire (Solera / DealerSocket)</option>
            <option>Cobalt / Ansira</option>
            <option>Naked Lime (Reynolds & Reynolds)</option>
            <option>Adpearance</option>
            <option>AutoRevo</option>
            <option>Dealer eProcess</option>
            <option>Search Optics</option>
            <option>Other / Custom</option>
          </select>
        </div>

          <label>Monthly Retainer ($)</label>

        </div>
        <div class="field">
          <label>Start Date</label>
          <input type="date" id="d_start"/>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="d_status">
            <option value="active">Active</option>

      </div>
      <div style="margin-top:16px">

      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('dealerModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDealer()">Save Dealer</button>
    </div>

<!-- ADD COMPETITOR MODAL -->

<!-- ADD VENDOR MODAL -->

        <div class="field">

        </div>

          <label>Additional Promises</label>

      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('vendorModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveVendor()">Save Vendor</button>
    </div>
  </div>
</div>

<script>
  // ── CONFIG & SUPABASE DIRECT ──
  let SB_URL = null;
  let SB_KEY = null;

  async function initConfig() {
    const res = await fetch('/.netlify/functions/config');
    if (!res.ok) throw new Error('Failed to load config');
    const cfg = await res.json();
    SB_URL = cfg.url;
    SB_KEY = cfg.key;
  }

  async function sbGet(table, query='') {
    const res = await fetch(`${SB_URL}/rest/v1/${table}${query}`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function sbPost(table, data) {
    const res = await fetch(`${SB_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`,
        'Content-Type': 'application/json', 'Prefer': 'return=representation'
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function sbPatch(table, id, data) {
    const res = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`,
        'Content-Type': 'application/json', 'Prefer': 'return=representation'
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function sbDelete(table, id) {
    const res = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    if (!res.ok) throw new Error(await res.text());
  }

  // Keep sbFetch for backwards compat with multi-query calls
  async function sbFetch(body) {
    if (body.queries) {
      return Promise.all(body.queries.map(q => sbGet(q.table, q.query || '')));
    }
    return sbGet(body.table, body.query || '');
  }

  // ── NAVIGATION ──
  function showPage(page, dealerId=null) {
    currentPage = page;
    if (dealerId) currentDealerId = dealerId;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const navMap = {'dashboard':'Dashboard','dealers':'Dealers','reports':'Monthly Reports','vendors':'Vendor Tracker','ai-visibility':'AI Visibility','competitors':'Competitor Intelligence','dealer-detail':'Dealer Detail'};
    document.querySelectorAll('.nav-item').forEach(el => {
      if (el.textContent.trim() === navMap[page]) el.classList.add('active');
    });
    document.getElementById('topbarTitle').textContent = navMap[page] || page;
    document.getElementById('topbarActions').innerHTML = '';
    const content = document.getElementById('pageContent');
    content.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:20px 0">Loading...</div>';
    if (page === 'dashboard') renderDashboard();
    else if (page === 'dealers') renderDealers();
    else if (page === 'dealer-detail') renderDealerDetail(currentDealerId);
    else if (page === 'reports') renderReports();
    else if (page === 'vendors') renderVendors();
    else if (page === 'ai-visibility') renderAIVisibility();
    else if (page === 'competitors') renderCompetitorsPage();
    setTimeout(() => lucide.createIcons(), 100);
  }

  let currentCompetitorDealerId = null;
  let editingCompetitorId = null;

  function openCompetitorModal(dealerId, existingComp=null) {
    currentCompetitorDealerId = dealerId;
    editingCompetitorId = existingComp?.id || null;
    document.querySelector('#competitorModal .modal-title').textContent = existingComp ? 'Edit Competitor' : 'Add Competitor';
    if (existingComp) {
      document.getElementById('c_name').value = existingComp.name || '';
      document.getElementById('c_brand').value = existingComp.brand || '';
      document.getElementById('c_website').value = existingComp.website_url || '';
      document.getElementById('c_gbp').value = existingComp.gbp_url || '';
      document.getElementById('c_notes').value = existingComp.notes || '';
      document.getElementById('c_order').value = existingComp.display_order || '1';
    } else {
      ['c_name','c_brand','c_website','c_gbp','c_notes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('c_order').value = '1';
    }
    const alert = document.getElementById('competitorAlert');
    alert.style.display = 'none';
    openModal('competitorModal');
  }

  async function saveCompetitor() {
    const name = document.getElementById('c_name').value.trim();
    if (!name) { alert('Competitor name is required.'); return; }
    const data = {
      dealer_id: currentCompetitorDealerId,
      name,
      brand: document.getElementById('c_brand').value.trim(),
      website_url: document.getElementById('c_website').value.trim(),
      gbp_url: document.getElementById('c_gbp').value.trim(),
      notes: document.getElementById('c_notes').value.trim(),
      display_order: parseInt(document.getElementById('c_order').value),
    };
    try {
      if (editingCompetitorId) {
        await sbPatch('competitors', editingCompetitorId, data);
      } else {
        await sbPost('competitors', data);
      }
      const alert = document.getElementById('competitorAlert');
      alert.textContent = editingCompetitorId ? 'Competitor updated successfully!' : 'Competitor saved successfully!';
      alert.className = 'alert alert-success';
      alert.style.display = 'block';
      setTimeout(() => { closeModal('competitorModal'); renderDealerDetail(currentCompetitorDealerId); }, 1000);
    } catch(e) {
      const alert = document.getElementById('competitorAlert');
      alert.textContent = 'Error: ' + e.message;
      alert.className = 'alert alert-error';
      alert.style.display = 'block';
    }
  }

  async function saveSalesData(dealerId, vendors) {
    const month = parseInt(document.getElementById('sd_month').value);
    const year = parseInt(document.getElementById('sd_year').value);
    const sold = parseInt(document.getElementById('sd_sold').value) || 0;
    const leads = parseInt(document.getElementById('sd_leads').value) || 0;
    const appts = parseInt(document.getElementById('sd_appts').value) || 0;
    const alert = document.getElementById('sdAlert');
    alert.style.display = 'none';

    if (!sold && !leads) {
      alert.textContent = 'Please enter at least total vehicles sold or total leads.';
      alert.className = 'alert alert-error';
      alert.style.display = 'block';
      return;
    }

    try {
      // Save main sales data
      await sbPost('sales_data', {
        dealer_id: dealerId,
        sale_month: month,
        sale_year: year,
        total_vehicles_sold: sold,
        total_leads: leads,
        total_appointments: appts,
        closing_rate: leads > 0 ? Math.round((sold/leads)*100*10)/10 : null,
        leads_from_paid_search: parseInt(document.getElementById('sd_paid').value) || 0,
        leads_from_organic: parseInt(document.getElementById('sd_organic').value) || 0,
        leads_from_third_party: parseInt(document.getElementById('sd_third').value) || 0,
        leads_from_phone: parseInt(document.getElementById('sd_phone').value) || 0,
        leads_from_walkin: parseInt(document.getElementById('sd_walkin').value) || 0,
        leads_from_other: parseInt(document.getElementById('sd_other').value) || 0,
      });

      // Save vendor attribution for each vendor
      for (const v of vendors) {
        const vLeads = parseInt(document.getElementById('vl_leads_'+v.id)?.value) || 0;
        const vAppts = parseInt(document.getElementById('vl_appts_'+v.id)?.value) || 0;
        const vSold = parseInt(document.getElementById('vl_sold_'+v.id)?.value) || 0;
        if (vLeads > 0 || vSold > 0) {
          const fee = parseFloat(v.fee) || 0;
          await sbPost('vendor_leads', {
            dealer_id: dealerId,
            vendor_id: v.id,
            attribution_month: month,
            attribution_year: year,
            leads_generated: vLeads,
            appointments_set: vAppts,
            vehicles_sold: vSold,
            cost_per_lead: vLeads > 0 ? Math.round((fee/vLeads)*100)/100 : null,
            cost_per_car_sold: vSold > 0 ? Math.round((fee/vSold)*100)/100 : null,
          });
        }
      }

      alert.textContent = 'Sales data saved successfully!';
      alert.className = 'alert alert-success';
      alert.style.display = 'block';
      loadSalesHistory(dealerId);

    } catch(e) {
      alert.textContent = 'Error saving: ' + e.message;
      alert.className = 'alert alert-error';
      alert.style.display = 'block';
    }
  }

        sbGet('sales_data', `?dealer_id=eq.${dealerId}&order=sale_year.desc,sale_month.desc&limit=12`),
        sbGet('vendor_leads', `?dealer_id=eq.${dealerId}&select=*,vendors(vendor_name,monthly_fee)&order=attribution_year.desc,attribution_month.desc&limit=24`),
      ]);

      if (sales.length === 0) {
        el.innerHTML = '<div style="font-size:13px;color:var(--muted)">No sales data entered yet.</div>';

        <div class="table-wrap" style="margin-bottom:20px">

            <tr><th>Period</th><th>Sold</th><th>Leads</th><th>Appts</th><th>Close Rate</th><th>Lead→Sale Rate</th></tr>
            ${sales.map(s => {
              const closeRate = s.total_appointments && s.total_leads ? Math.round((s.total_appointments/s.total_leads)*100) : null;
              const saleRate = s.total_vehicles_sold && s.total_leads ? Math.round((s.total_vehicles_sold/s.total_leads)*100) : null;
              return `<tr>
                <td class="td-main">${months[s.sale_month-1]} ${s.sale_year}</td>

                <td>${s.total_leads || '-'}</td>

                <td>${closeRate ? closeRate+'%' : '-'}</td>
                <td>${saleRate ? saleRate+'%' : '-'}</td>
              </tr>`;
            }).join('')}
          </table>
        </div>

        ${vendorLeads.length > 0 ? `
          <div style="font-family:var(--font-h);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue-light);margin-bottom:12px">Vendor ROI History</div>
          <div class="table-wrap">
            <table>
              <tr><th>Vendor</th><th>Period</th><th>Fee</th><th>Leads</th><th>Cars Sold</th><th>Cost/Lead</th><th>Cost/Car Sold</th><th>Verdict</th></tr>
              ${vendorLeads.map(vl => {
                const fee = parseFloat(vl.vendors?.monthly_fee || 0);
                const cpcs = vl.cost_per_car_sold;
                let verdict = '—';
                let verdictColor = 'var(--muted)';
                if (cpcs) {
                  if (cpcs < 300) { verdict = 'Strong ROI'; verdictColor = 'var(--success)'; }

                  else { verdict = 'Not Justified'; verdictColor = 'var(--danger)'; }
                }
                return `<tr>
                  <td class="td-main">${vl.vendors?.vendor_name || '-'}</td>
                  <td>${months[vl.attribution_month-1]} ${vl.attribution_year}</td>
                  <td>$${fee.toLocaleString()}</td>
                  <td>${vl.leads_generated || 0}</td>
                  <td>${vl.vehicles_sold || 0}</td>
                  <td>${vl.cost_per_lead ? '$'+Math.round(vl.cost_per_lead) : '—'}</td>
                  <td style="font-weight:600">${cpcs ? '$'+Math.round(cpcs).toLocaleString() : '—'}</td>

                </tr>`;

  async function generateReport() {
    const dealerId = document.getElementById('rpt_dealer').value;
    const month = document.getElementById('rpt_month').value;
    const year = document.getElementById('rpt_year').value;
    const errEl = document.getElementById('rptError');
    errEl.style.display = 'none';

    if (!dealerId) { errEl.textContent = 'Please select a dealer.'; errEl.style.display = 'block'; return; }

    const btn = document.getElementById('rptBtn');
    btn.disabled = true;
    btn.textContent = 'Starting report...';

    const output = document.getElementById('reportOutput');

    try {
      // Step 1 — Create a pending report record and get a job_id
      const jobId = 'job_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);

      const jobRecord = await sbPost('monthly_reports', {
        dealer_id: dealerId,
        report_month: parseInt(month),
        report_year: parseInt(year),
        job_id: jobId,
        job_status: 'pending',
        status: 'draft',
      });

      // Step 2 — Fire off the background function
      fetch('/.netlify/functions/generate-report-background', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          dealer_id: dealerId,
          report_month: parseInt(month),
          report_year: parseInt(year),
          job_id: jobId,
        }),
      }).catch(() => {}); // background — don't await

      // Step 3 — Show loading UI and start polling
      btn.textContent = 'Generating...';
      output.innerHTML = `
        <div class="card" style="text-align:center;padding:48px">
          <div style="width:52px;height:52px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.85s linear infinite;margin:0 auto 20px"></div>
          <div style="font-family:var(--font-h);font-size:14px;font-weight:700;margin-bottom:8px">Generating Intelligence Report</div>
          <div style="font-size:13px;color:var(--white2);margin-bottom:24px">Researching dealer, competitors, and vendors live...<br>This takes 1-2 minutes. You can navigate away and come back.</div>
          <div id="genSteps" style="text-align:left;display:inline-block">
            <div class="step active" id="gs1"><div class="step-dot">1</div><span>Pulling dealer and vendor data</span></div>
            <div class="step" id="gs2"><div class="step-dot">2</div><span>Researching dealer online presence</span></div>
            <div class="step" id="gs3"><div class="step-dot">3</div><span>Analyzing competitors</span></div>
            <div class="step" id="gs4"><div class="step-dot">4</div><span>Scoring vendor accountability</span></div>
            <div class="step" id="gs5"><div class="step-dot">5</div><span>Calculating sales ROI</span></div>
            <div class="step" id="gs6"><div class="step-dot">6</div><span>Building action plan</span></div>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:20px" id="pollStatus">Starting analysis...</div>
        </div>`;

      // Animate steps while waiting
      const stepSeq = [['gs1',0],['gs2',8000],['gs3',18000],['gs4',30000],['gs5',42000],['gs6',55000]];
      const stepTimers = [];
      stepSeq.forEach(([id,delay],i,arr) => {
        stepTimers.push(setTimeout(() => {
          const el = document.getElementById(id);
          if (el) el.className = 'step active';
          if (i > 0) {
            const prev = document.getElementById(arr[i-1][0]);
            if (prev) prev.className = 'step done';
          }
        }, delay));
      });

      // Step 4 — Poll for completion
      let attempts = 0;
      const maxAttempts = 60; // 5 minutes max
      const poll = setInterval(async () => {
        attempts++;
        const pollEl = document.getElementById('pollStatus');
        if (pollEl) pollEl.textContent = `Checking status... (${attempts * 5}s elapsed)`;

        try {
          const res = await fetch(`/.netlify/functions/report-status?job_id=${jobId}`);
          const data = await res.json();

          if (data.status === 'complete' && data.report) {
            clearInterval(poll);
            stepTimers.forEach(clearTimeout);
            ['gs1','gs2','gs3','gs4','gs5','gs6'].forEach(id => {
              const el = document.getElementById(id);
              if (el) el.className = 'step done';
            });
            setTimeout(() => {
              renderReportOutput(data.report);
              btn.disabled = false;
              btn.textContent = 'Generate Intelligence Report';
            }, 500);

          } else if (data.status === 'failed') {
            clearInterval(poll);
            stepTimers.forEach(clearTimeout);
            output.innerHTML = `<div class="alert alert-error" style="display:block">Report generation failed: ${data.error || 'Unknown error'}. Please try again.</div>`;
            btn.disabled = false;
            btn.textContent = 'Generate Intelligence Report';

          } else if (attempts >= maxAttempts) {
            clearInterval(poll);
            stepTimers.forEach(clearTimeout);
            output.innerHTML = `<div class="alert alert-error" style="display:block">Report is taking longer than expected. Please check back in a few minutes or try regenerating.</div>`;
            btn.disabled = false;
            btn.textContent = 'Generate Intelligence Report';
          }
        } catch(e) {
          console.warn('Poll error:', e.message);
        }
      }, 5000);

    } catch(e) {
      output.innerHTML = `<div class="alert alert-error" style="display:block">Failed to start report: ${e.message}</div>`;
      btn.disabled = false;
      btn.textContent = 'Generate Intelligence Report';
    }
  }

  // ── SAVE DEALER ──
  async function saveDealer() {
    const name = document.getElementById('d_name').value.trim();
    if (!name) { alert('Dealer name is required.'); return; }
    const data = {
      name, brand: document.getElementById('d_brand').value.trim(),
      city: document.getElementById('d_city').value.trim(),
      state: document.getElementById('d_state').value.trim(),
      website_url: document.getElementById('d_website').value.trim(),
      gbp_url: document.getElementById('d_gbp').value.trim(),
      cms_provider: document.getElementById('d_cms').value,
      monthly_retainer: parseFloat(document.getElementById('d_retainer').value) || null,
      start_date: document.getElementById('d_start').value || null,
      status: document.getElementById('d_status').value,
      notes: document.getElementById('d_notes').value.trim(),
    };
    try {
      if (editingDealerId) {
        await sbPatch('dealers', editingDealerId, data);
      } else {
        await sbPost('dealers', data);
      }
      const alert = document.getElementById('dealerAlert');
      alert.textContent = editingDealerId ? 'Dealer updated successfully!' : 'Dealer saved successfully!';
      alert.className = 'alert alert-success';
      alert.style.display = 'block';
      setTimeout(() => {
        closeModal('dealerModal');
        if (editingDealerId) renderDealerDetail(editingDealerId);
        else renderDealers();
      }, 1000);
    } catch(e) {
      const alert = document.getElementById('dealerAlert');
      alert.textContent = 'Error saving dealer: ' + e.message;
      alert.className = 'alert alert-error';
      alert.style.display = 'block';
    }
  }

      promised_deliverables: document.getElementById('v_deliverables').value.trim(),
      additional_promises: document.getElementById('v_promises').value.trim(),
      status: 'active',
    };
    try {
      if (editingVendorId) {
        await sbPatch('vendors', editingVendorId, data);
      } else {
        await sbPost('vendors', data);
      }
      const alert = document.getElementById('vendorAlert');
      alert.textContent = editingVendorId ? 'Vendor updated successfully!' : 'Vendor saved successfully!';
      alert.className = 'alert alert-success';
      alert.style.display = 'block';
      setTimeout(() => { closeModal('vendorModal'); renderDealerDetail(currentVendorDealerId); }, 1000);
    } catch(e) {
      const alert = document.getElementById('vendorAlert');
      alert.textContent = 'Error saving vendor: ' + e.message;
      alert.className = 'alert alert-error';
      alert.style.display = 'block';
    }
  }

  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });
  });

  // ── INIT ──
  async function init() {
    try {
      await initConfig();
      showPage('dashboard');
      lucide.createIcons();
    } catch(e) {
      document.getElementById('pageContent').innerHTML = `
        <div class="empty">
          <div class="empty-icon">⚠️</div>
          <div class="empty-title">Configuration Error</div>
          <div class="empty-sub">${e.message}<br><br>Make sure SUPABASE_URL and SUPABASE_ANON_KEY are set in Netlify environment variables.</div>
        </div>`;
    }
  }
  init();
</script>
</body>
</html>
